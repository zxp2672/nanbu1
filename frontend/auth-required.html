<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游客提示 - 南部县校友会联盟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0d1b35 0%, #1a365d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1a365d;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .message {
            color: #666;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .features {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
            text-align: left;
        }

        .features h3 {
            color: #1a365d;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            color: #666;
        }

        .feature-item::before {
            content: '✓';
            color: #00ff88;
            font-weight: bold;
            margin-right: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <h1>需要登录</h1>
        <p class="message">
            您正在以<span class="highlight">游客身份</span>浏览<br>
            此功能需要<span class="highlight">登录</span>或<span class="highlight">注册</span>后才能使用
        </p>
        
        <div class="buttons">
            <button class="btn btn-primary" onclick="goLogin()">立即登录</button>
            <button class="btn btn-secondary" onclick="goRegister()">注册账号</button>
        </div>

        <div class="features">
            <h3>登录后您可以：</h3>
            <div class="feature-item">查看校友详细信息和联系方式</div>
            <div class="feature-item">发布和管理校友动态</div>
            <div class="feature-item">参与资源分享和活动报名</div>
            <div class="feature-item">与校友互动交流</div>
            <div class="feature-item">管理个人资料</div>
        </div>
    </div>

    <script>
        // 获取返回URL
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('return') || '/';

        function goLogin() {
            window.location.href = `/?action=login&return=${encodeURIComponent(returnUrl)}`;
        }

        function goRegister() {
            window.location.href = `/?action=register&return=${encodeURIComponent(returnUrl)}`;
        }

        // 如果已经登录，直接返回
        if (localStorage.getItem('token')) {
            window.location.href = returnUrl;
        }
    </script>
</body>
</html>
