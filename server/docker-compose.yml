version: '3.8'

services:
  nanbu-alumni:
    build: .
    container_name: nanbu-alumni
    ports:
      - "3000:3000"
    volumes:
      - ./database.sqlite:/app/database.sqlite
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=nanbu-alumni-secret-key-2024-change-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
