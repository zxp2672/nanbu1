server:
  port: 8080

spring:
  application:
    name: nanbu-alumni

  datasource:
    url: jdbc:mysql://localhost:3306/nanbu_alumni?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# JWT配置
jwt:
  secret: nanbu-alumni-secret-key-2024-very-long-and-secure-key-for-jwt-signing
  expiration: 86400000  # 24小时，单位毫秒

# 日志配置
logging:
  level:
    com.nanbu.alumni: DEBUG
    org.springframework.security: DEBUG
